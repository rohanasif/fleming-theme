<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/724eb3146a.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="bg w-full h-screen overflow-hidden flex relative">
        <div class="slider-anime h-min absolute">
            <img src="./images/slider-shape-1.png" alt="">
        </div>
        <div class="relative width-85">
            <div class="absolute w-full">
                <div class="flex justify-end">
                    <div><i class="fa-brands fa-facebook-f"></i></div>
                    <div><i class="fa-brands fa-twitter"></i></div>
                    <div><i class="fa-brands fa-linkedin-in"></i></div>
                    <div><i class="fa-brands fa-google-plus-g"></i></div>
                </div>
                <div class="flex">
                    <div class="w-full">
                        <img src="./images/logo.png" alt="">
                    </div>
                    <div class="w-full self-center">
                        <ul class="flex text-white justify-between">
                            <li>HOME</li>
                            <li>ABOUT</li>
                            <li>SERVICES</li>
                            <li>PAGES</li>
                            <li>BLOG</li>
                            <li>CONTACT</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
</body>

</html>
